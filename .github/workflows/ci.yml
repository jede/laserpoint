name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    # Match the release runner (Xcode 26's actool emits the app-icon .icns).
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: swift build -c release

      - name: Test
        run: swift test

      - name: Assemble app bundle
        run: ./build.sh
