name: Release

# Push a tag like `v0.1.0` to build the DMG and publish a GitHub Release.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # needed to create the release

jobs:
  release:
    # macOS 26 ships Xcode 26, whose actool emits the standalone .icns from the
    # Icon Composer .icon package. Older runners emit only Assets.car, which
    # build.sh drops — leaving the DMG with no app icon.
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Build universal DMG
        run: |
          export VERSION="${GITHUB_REF_NAME#v}"   # strip leading "v" from the tag
          ./build.sh dmg

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            Laserpoint-*.dmg
